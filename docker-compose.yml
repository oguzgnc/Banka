services:
  frontend:
    build: 
      context: ./frontend
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules # Lokaldeki node_modules'in container'ı bozmasını engeller
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

  backend:
    build: 
      context: ./backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app